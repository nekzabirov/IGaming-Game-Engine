name: Publish gRPC Client to GitHub Packages

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VALUE="${{ inputs.version }}"
          else
            VALUE="${GITHUB_REF_NAME}"
          fi
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Build and publish gRPC client
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          # User-owned private packages can't be read with the auto GITHUB_TOKEN.
          # The same PAT also publishes game-grpc-client (needs write:packages on this repo).
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: >
          ./gradlew
          generateProto
          grpcClientJar
          publishGrpcClientPublicationToGitHubPackagesRepository
          -PgrpcClientVersion=${{ steps.ver.outputs.value }}
          --no-daemon
          -x test
