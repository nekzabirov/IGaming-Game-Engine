syntax = "proto3";

package game.v1;

option java_package = "com.nekgamebling.game.v1";
option java_multiple_files = true;

import "game/v1/dto/collection.dto.proto";
import "game/v1/dto/common.dto.proto";
import "game/v1/dto/game_filter.dto.proto";
import "game/v1/dto/game_page.dto.proto";

// ---------------------------------------------------------------------------
// Collection catalog service — read + upsert plus game-membership management.
// Collections are contract artefacts and cannot be deleted once created.
//
// Every Save is a typed upsert (create-or-update) with explicit fields,
// mirroring `application.command.collection.SaveCollectionCommand` on the
// Kotlin side. FindAll takes a dedicated CollectionFilter sub-message.
// FindAllGame returns the games that belong to a given collection — same
// filter and response shape as `GameService.FindAll`, plus the collection
// identity the caller is narrowing by, ordered by the per-collection
// position managed through AddGame / RemoveGame / UpdateGameOrder.
//
// Game-in-collection membership is managed with three single-game RPCs:
//   - AddGame         — idempotent insert, new row appended at end
//   - RemoveGame      — idempotent delete
//   - UpdateGameOrder — set per-collection sort position for one game
// ---------------------------------------------------------------------------
service CollectionService {
  rpc Save(SaveCollectionCommand) returns (Empty);

  rpc Find(FindCollectionQuery) returns (FindCollectionQuery.Result);

  rpc FindAll(FindAllCollectionQuery) returns (FindAllCollectionQuery.Result);

  rpc Batch(BatchCollectionQuery) returns (BatchCollectionQuery.Result);

  rpc FindAllGame(FindAllGameCollectionQuery) returns (GamePageDto);

  rpc AddGame(AddCollectionGameCommand) returns (Empty);

  rpc RemoveGame(RemoveCollectionGameCommand) returns (Empty);

  rpc UpdateGameOrder(UpdateCollectionGameOrderCommand) returns (Empty);

  rpc UpdateImage(UpdateCollectionImageCommand) returns (Empty);
}

// ---------------------------------------------------------------------------
// Commands
// ---------------------------------------------------------------------------

message SaveCollectionCommand {
  string identity = 1;

  // Localized name map (locale → display name), e.g. {"en": "Popular", "ru": "Популярные"}.
  map<string, string> name = 2;

  bool active = 3;

  int32 order = 4;
}

// Add a single game to a collection. Idempotent — if the game is already
// in the collection, the call is a no-op. On first insert the new row is
// appended at the end (sort_order = max existing + 1, or 0 when empty).
// Fails with NOT_FOUND if the collection or the game does not exist.
message AddCollectionGameCommand {
  string identity = 1;

  string game_identity = 2;
}

// Remove a single game from a collection. Idempotent — if the game is not
// currently a member, the call is a no-op. Fails with NOT_FOUND if the
// collection or the game does not exist.
message RemoveCollectionGameCommand {
  string identity = 1;

  string game_identity = 2;
}

// Set the per-collection display order for a single game inside a
// collection. Fails with NOT_FOUND if the collection does not exist, or if
// the game is not currently a member of the collection.
message UpdateCollectionGameOrderCommand {
  string identity = 1;

  string game_identity = 2;

  int32 order = 3;
}

message UpdateCollectionImageCommand {
  string identity = 1;

  string key = 2;

  bytes file = 3;

  string extension = 4;
}

// ---------------------------------------------------------------------------
// Queries
// ---------------------------------------------------------------------------

message FindCollectionQuery {
  string identity = 1;

  message Result {
    CollectionDto item = 1;
  }
}

message CollectionFilter {
  string query = 1;

  optional bool active = 2;

  repeated string in_tags = 3;

  repeated string in_provider_identities = 4;
}

message FindAllCollectionQuery {
  CollectionFilter filter = 1;

  int32 page_num = 2;

  int32 page_size = 3;

  message Result {
    repeated CollectionDto items = 1;

    int32 total_items = 2;
  }
}

message BatchCollectionQuery {
  repeated string identities = 1;

  message Result {
    repeated CollectionDto items = 1;
  }
}

// Paged game listing narrowed to a specific collection. Uses the shared
// `GameFilter` and returns the shared `GamePageDto` — the only extra input
// is `collection_identity`, which picks which collection's games to read.
message FindAllGameCollectionQuery {
  string collection_identity = 1;

  GameFilter filter = 2;

  int32 page_num = 3;

  int32 page_size = 4;
}
