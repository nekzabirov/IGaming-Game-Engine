syntax = "proto3";

package game.v1;

option java_package = "com.nekgamebling.game.v1";
option java_multiple_files = true;

import "game/v1/dto/collection.dto.proto";
import "game/v1/dto/common.dto.proto";

// ---------------------------------------------------------------------------
// Collection catalog service — full CRUD plus game-membership management.
//
// Every Save is a typed upsert (create-or-update) with explicit fields,
// mirroring `application.command.collection.SaveCollectionCommand` on the
// Kotlin side. FindAll takes a dedicated CollectionFilter sub-message.
// ---------------------------------------------------------------------------
service CollectionService {
  rpc Save(SaveCollectionCommand) returns (Empty);

  rpc Find(FindCollectionQuery) returns (FindCollectionQuery.Result);

  rpc FindAll(FindAllCollectionQuery) returns (FindAllCollectionQuery.Result);

  rpc Batch(BatchCollectionQuery) returns (BatchCollectionQuery.Result);

  rpc Delete(DeleteCollectionCommand) returns (Empty);

  rpc UpdateGames(UpdateCollectionGamesCommand) returns (Empty);

  rpc UpdateImage(UpdateCollectionImageCommand) returns (Empty);
}

// ---------------------------------------------------------------------------
// Commands
// ---------------------------------------------------------------------------

message SaveCollectionCommand {
  string identity = 1;

  // Localized name map (locale → display name), e.g. {"en": "Popular", "ru": "Популярные"}.
  map<string, string> name = 2;

  bool active = 3;

  int32 order = 4;
}

message DeleteCollectionCommand {
  string identity = 1;
}

message UpdateCollectionGamesCommand {
  string identity = 1;

  repeated string add_games = 2;

  repeated string remove_games = 3;
}

message UpdateCollectionImageCommand {
  string identity = 1;

  string key = 2;

  bytes file = 3;

  string extension = 4;
}

// ---------------------------------------------------------------------------
// Queries
// ---------------------------------------------------------------------------

message FindCollectionQuery {
  string identity = 1;

  message Result {
    CollectionDto item = 1;
  }
}

message CollectionFilter {
  string query = 1;

  optional bool active = 2;

  repeated string in_tags = 3;

  repeated string in_provider_identities = 4;
}

message FindAllCollectionQuery {
  CollectionFilter filter = 1;

  int32 page_num = 2;

  int32 page_size = 3;

  message Result {
    repeated CollectionDto items = 1;

    int32 total_items = 2;
  }
}

message BatchCollectionQuery {
  repeated string identities = 1;

  message Result {
    repeated CollectionDto items = 1;
  }
}
