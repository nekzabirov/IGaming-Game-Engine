syntax = "proto3";

package game.v1;

option java_package = "com.nekgamebling.game.v1";
option java_multiple_files = true;

import "game/v1/dto/game.dto.proto";
import "game/v1/dto/provider.dto.proto";
import "game/v1/dto/aggregator.dto.proto";
import "game/v1/dto/collection.dto.proto";
import "game/v1/dto/common.dto.proto";

// ---------------------------------------------------------------------------
// Game catalog service — full CRUD plus gameplay entrypoints.
//
// Naming convention (uniform across Game / Collection / Provider / Aggregator):
//   Save<X>Command     — create-or-update (upsert) with typed fields
//   Find<X>Query       — read one by identity; Result carries denormalized
//                        related entities (provider + aggregator + collections)
//   FindAll<X>Query    — paged read; carries a single <X>Filter sub-message
//   Batch<X>Query      — read many by repeated string identities
//   Delete<X>Command   — hard delete by identity
//   Update<X>ImageCommand — attach/replace a keyed image URL
// ---------------------------------------------------------------------------
service GameService {
  rpc Save(SaveGameCommand) returns (Empty);

  rpc Find(FindGameQuery) returns (FindGameQuery.Result);

  rpc FindAll(FindAllGameQuery) returns (FindAllGameQuery.Result);

  rpc Batch(BatchGameQuery) returns (BatchGameQuery.Result);

  rpc Delete(DeleteGameCommand) returns (Empty);

  rpc UpdateImage(UpdateGameImageCommand) returns (Empty);

  rpc Play(PlayGameCommand) returns (PlayGameCommand.Result);

  rpc OpenDemo(OpenDemoQuery) returns (OpenDemoQuery.Result);

  rpc AddFavourite(GameFavouriteCommand) returns (Empty);

  rpc RemoveFavourite(GameFavouriteCommand) returns (Empty);
}

// ---------------------------------------------------------------------------
// Commands
// ---------------------------------------------------------------------------

message SaveGameCommand {
  string identity = 1;

  string name = 2;

  bool bonus_bet_enable = 3;

  bool bonus_wagering_enable = 4;

  repeated string tags = 5;

  string provider_identity = 6;
}

message DeleteGameCommand {
  string identity = 1;
}

message UpdateGameImageCommand {
  string identity = 1;

  string key = 2;

  bytes file = 3;

  string extension = 4;
}

message PlayGameCommand {
  string identity = 1;

  string player_id = 2;

  string locale = 3;

  PlatformDto platform = 4;

  string currency = 5;

  optional int64 max_spin_place_amount = 6;

  message Result {
    string launch_url = 1;
  }
}

message GameFavouriteCommand {
  string identity = 1;

  string player_id = 2;
}

// ---------------------------------------------------------------------------
// Queries
// ---------------------------------------------------------------------------

message FindGameQuery {
  string identity = 1;

  message Result {
    GameDto item = 1;

    ProviderDto provider = 2;

    AggregatorDto aggregator = 3;

    repeated CollectionDto collections = 4;
  }
}

// Composite filter for FindAllGameQuery. Every boolean is tri-state via
// `optional` — "unset" means "do not filter on this flag".
message GameFilter {
  string query = 1;

  optional bool active = 2;

  optional string provider_identity = 3;

  repeated string tags = 4;

  optional bool bonus_bet_enable = 5;

  optional bool bonus_wagering_enable = 6;

  optional bool free_spin_enable = 7;

  optional bool free_chip_enable = 8;

  optional bool jackpot_enable = 9;

  optional bool demo_enable = 10;

  optional bool bonus_buy_enable = 11;
}

message FindAllGameQuery {
  GameFilter filter = 1;

  int32 page_num = 2;

  int32 page_size = 3;

  message Result {
    repeated Item items = 1;

    // Denormalized sets — every Item.provider points by identity into
    // `providers`; each provider's aggregator is in `aggregators`; any
    // collection referenced by an item game is in `collections`.
    repeated ProviderDto providers = 2;

    repeated AggregatorDto aggregators = 3;

    repeated CollectionDto collections = 4;

    int32 total_items = 5;

    message Item {
      GameDto game = 1;

      ProviderDto provider = 2;
    }
  }
}

message BatchGameQuery {
  repeated string identities = 1;

  message Result {
    repeated Item items = 1;

    repeated ProviderDto providers = 2;

    repeated AggregatorDto aggregators = 3;

    repeated CollectionDto collections = 4;

    message Item {
      GameDto game = 1;

      ProviderDto provider = 2;
    }
  }
}

message OpenDemoQuery {
  string identity = 1;

  string currency = 2;

  string locale = 3;

  PlatformDto platform = 4;

  string lobby_url = 5;

  message Result {
    string launch_url = 1;
  }
}
