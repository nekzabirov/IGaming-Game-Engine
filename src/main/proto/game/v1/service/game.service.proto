syntax = "proto3";

package game.v1;

option java_package = "com.nekgamebling.game.v1";
option java_multiple_files = true;

import "game/v1/dto/game.dto.proto";
import "game/v1/dto/provider.dto.proto";
import "game/v1/dto/aggregator.dto.proto";
import "game/v1/dto/collection.dto.proto";
import "game/v1/dto/common.dto.proto";
import "game/v1/dto/game_filter.dto.proto";
import "game/v1/dto/game_page.dto.proto";

// ---------------------------------------------------------------------------
// Game catalog service — read + upsert + gameplay entrypoints. No delete:
// games, providers and collections are contract artefacts that must not be
// removed once they are in the catalog.
//
// Naming convention (uniform across Game / Collection / Provider):
//   Save<X>Command     — create-or-update (upsert) with typed fields
//   Find<X>Query       — read one by identity; Result carries denormalized
//                        related entities (provider + aggregator + collections)
//   FindAll<X>Query    — paged read; carries a single <X>Filter sub-message
//   Batch<X>Query      — read many by repeated string identities
//   Update<X>ImageCommand — attach/replace a keyed image URL
// ---------------------------------------------------------------------------
service GameService {
  rpc Save(SaveGameCommand) returns (Empty);

  rpc Find(FindGameQuery) returns (FindGameQuery.Result);

  rpc FindAll(FindAllGameQuery) returns (GamePageDto);

  rpc Batch(BatchGameQuery) returns (BatchGameQuery.Result);

  rpc UpdateImage(UpdateGameImageCommand) returns (Empty);

  rpc Play(PlayGameCommand) returns (PlayGameCommand.Result);

  rpc OpenDemo(OpenDemoQuery) returns (OpenDemoQuery.Result);

  rpc AddFavourite(GameFavouriteCommand) returns (Empty);

  rpc RemoveFavourite(GameFavouriteCommand) returns (Empty);

  rpc FindAllPlayerFavourite(FindAllGamePlayerFavouriteQuery) returns (GamePageDto);
}

// ---------------------------------------------------------------------------
// Commands
// ---------------------------------------------------------------------------

message SaveGameCommand {
  string identity = 1;

  string name = 2;

  bool bonus_bet_enable = 3;

  bool bonus_wagering_enable = 4;

  repeated string tags = 5;

  string provider_identity = 6;
}

message UpdateGameImageCommand {
  string identity = 1;

  string key = 2;

  bytes file = 3;

  string extension = 4;
}

message PlayGameCommand {
  string identity = 1;

  string player_id = 2;

  string locale = 3;

  PlatformDto platform = 4;

  string currency = 5;

  optional int64 max_spin_place_amount = 6;

  message Result {
    string launch_url = 1;
  }
}

message GameFavouriteCommand {
  string identity = 1;

  string player_id = 2;
}

// ---------------------------------------------------------------------------
// Queries
// ---------------------------------------------------------------------------

message FindGameQuery {
  string identity = 1;

  message Result {
    GameDto item = 1;

    ProviderDto provider = 2;

    AggregatorDto aggregator = 3;

    repeated CollectionDto collections = 4;
  }
}

// Paged game listing with a shared GameFilter. Returns the shared
// `GamePageDto` — same response shape as every other paged game-listing RPC.
message FindAllGameQuery {
  GameFilter filter = 1;

  int32 page_num = 2;

  int32 page_size = 3;
}

message BatchGameQuery {
  repeated string identities = 1;

  // Batch has its own Result because it does NOT carry `total_items`
  // (it is not paged — the caller already supplied the identities).
  message Result {
    repeated GameDto items = 1;

    repeated ProviderDto providers = 2;

    repeated AggregatorDto aggregators = 3;

    repeated CollectionDto collections = 4;
  }
}

// Paged game listing restricted to a specific player's favourites. Reuses
// the shared `GameFilter` and `GamePageDto`; the only extra input is
// `player_id`, which picks whose favourites to read.
message FindAllGamePlayerFavouriteQuery {
  string player_id = 1;

  GameFilter filter = 2;

  int32 page_num = 3;

  int32 page_size = 4;
}

message OpenDemoQuery {
  string identity = 1;

  string currency = 2;

  string locale = 3;

  PlatformDto platform = 4;

  string lobby_url = 5;

  message Result {
    string launch_url = 1;
  }
}
