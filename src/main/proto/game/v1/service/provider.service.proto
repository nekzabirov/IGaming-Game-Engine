syntax = "proto3";

package game.v1;

option java_package = "com.nekgamebling.game.v1";
option java_multiple_files = true;

import "game/v1/dto/aggregator.dto.proto";
import "game/v1/dto/provider.dto.proto";
import "game/v1/dto/common.dto.proto";

// ---------------------------------------------------------------------------
// Provider catalog service — read + upsert. Providers are contract artefacts
// and cannot be deleted once registered.
//
// Every Save is a typed upsert mirroring
// `application.command.provider.SaveProviderCommand`. FindAll takes a
// dedicated ProviderFilter sub-message.
// ---------------------------------------------------------------------------
service ProviderService {
  rpc Save(SaveProviderCommand) returns (Empty);

  rpc Find(FindProviderQuery) returns (FindProviderQuery.Result);

  rpc FindAll(FindAllProviderQuery) returns (FindAllProviderQuery.Result);

  rpc Batch(BatchProviderQuery) returns (BatchProviderQuery.Result);

  rpc UpdateImage(UpdateProviderImageCommand) returns (Empty);
}

// ---------------------------------------------------------------------------
// Commands
// ---------------------------------------------------------------------------

message SaveProviderCommand {
  string identity = 1;

  string name = 2;

  int32 order = 3;

  bool active = 4;

  string aggregator_identity = 5;
}

message UpdateProviderImageCommand {
  string identity = 1;

  string key = 2;

  bytes file = 3;

  string extension = 4;
}

// ---------------------------------------------------------------------------
// Queries
// ---------------------------------------------------------------------------

message FindProviderQuery {
  string identity = 1;

  message Result {
    ProviderDto item = 1;

    AggregatorDto aggregator = 2;
  }
}

message ProviderFilter {
  string query = 1;

  optional bool active = 2;

  optional string aggregator_identity = 3;

  repeated string in_collection_identities = 4;
}

message FindAllProviderQuery {
  ProviderFilter filter = 1;

  int32 page_num = 2;

  int32 page_size = 3;

  message Result {
    repeated ProviderDto items = 1;

    // Denormalized aggregators referenced by any provider in `items`.
    repeated AggregatorDto aggregators = 2;

    int32 total_items = 3;
  }
}

message BatchProviderQuery {
  repeated string identities = 1;

  message Result {
    repeated ProviderDto items = 1;

    repeated AggregatorDto aggregators = 2;
  }
}
