syntax = "proto3";

package game.v1;

option java_package = "com.nekgamebling.game.v1";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";
import "game/v1/common.dto.proto";
import "game/v1/session.dto.proto";
import "game/v1/game.dto.proto";
import "game/v1/provider.dto.proto";

service RoundService {
  rpc Find(FindRoundQuery) returns (FindRoundResult);
  rpc FindAll(FindAllRoundQuery) returns (FindAllRoundResult);
}

// ============================================
// Find Single Round
// ============================================

message FindRoundQuery {
  string id = 1;
}

message FindRoundResult {
  RoundItemDto item = 1;
}

// ============================================
// Find All Rounds (Paginated)
// ============================================

message FindAllRoundQuery {
  // Pagination
  PaginationRequestDto pagination = 1;

  // Filters
  optional string game_identity = 2;
  optional string provider_identity = 3;
  optional bool finished = 4;
  optional string player_id = 5;
  optional string free_spin_id = 6;

  // Date range filter for created_at
  optional google.protobuf.Timestamp start_at = 7;
  optional google.protobuf.Timestamp end_at = 8;

  // Place amount range filter (total_place_real + total_place_bonus)
  optional int64 min_place_amount = 9;
  optional int64 max_place_amount = 10;

  // Settle amount range filter (total_settle_real + total_settle_bonus)
  optional int64 min_settle_amount = 11;
  optional int64 max_settle_amount = 12;
}

message FindAllRoundResult {
  // Paginated round items
  repeated RoundItemDto items = 1;
  PaginationMetaDto pagination = 2;

  // Related entities from results
  repeated ProviderDto providers = 3;
  repeated GameDto games = 4;
}

message RoundItemDto {
  RoundDto round = 1;

  string provider_identity = 2;
  string game_identity = 3;
  string player_id = 4;
  string currency = 5;

  int64 total_place_real = 6;
  int64 total_place_bonus = 7;
  int64 total_settle_real = 8;
  int64 total_settle_bonus = 9;
}
