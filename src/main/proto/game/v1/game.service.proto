syntax = "proto3";

package game.v1;

option java_package = "com.nekgamebling.game.v1";
option java_multiple_files = true;

import "game/v1/common.dto.proto";
import "game/v1/provider.dto.proto";
import "game/v1/game.dto.proto";
import "game/v1/aggregator.dto.proto";
import "game/v1/collection.dto.proto";

service GameService {
  rpc Find(FindGameQuery) returns (FindGameResult);
  rpc FindAll(FindAllGameQuery) returns (FindAllGameResult);
  rpc Play(PlayGameCommand) returns (PlayGameResult);
  rpc DemoUrl(GameDemoUrlQuery) returns (GameDemoUrlResult);
  rpc Update(UpdateGameCommand) returns (UpdateGameResult);
  rpc UpdateImage(UpdateGameImageCommand) returns (UpdateGameImageResult);
  rpc AddTag(AddGameTagCommand) returns (AddGameTagResult);
  rpc RemoveTag(RemoveGameTagCommand) returns (RemoveGameTagResult);

  // Favourite operations
  rpc AddFavourite(AddGameFavouriteCommand) returns (AddGameFavouriteResult);
  rpc RemoveFavourite(RemoveGameFavouriteCommand) returns (RemoveGameFavouriteResult);

  // Game wins
  rpc FindAllGameWins(FindAllGameWinsQuery) returns (FindAllGameWinsResult);

  // Freespin operations
  rpc GetFreespinPreset(GetFreespinPresetQuery) returns (GetFreespinPresetResult);
  rpc CreateFreespin(CreateFreespinCommand) returns (CreateFreespinResult);
  rpc CancelFreespin(CancelFreespinCommand) returns (CancelFreespinResult);
}

// ============================================
// Find Single Game
// ============================================

message FindGameQuery {
  string identity = 1;
}

message FindGameResult {
  GameDto game = 1;

  ProviderDto provider = 2;

  GameVariantDto active_variant = 3;

  AggregatorInfoDto aggregator = 4;

  repeated CollectionDto collections = 5;
}

// ============================================
// Find All Games (Paginated)
// ============================================

message FindAllGameQuery {
  // Pagination
  PaginationRequestDto pagination = 1;

  // Search query (matches game name or identity)
  string query = 2;

  // Filters
  optional bool active = 3;
  repeated string provider_identities = 4;
  repeated string collection_identities = 5;
  repeated string tags = 6;

  // Game feature filters
  optional bool bonus_bet_enable = 7;
  optional bool bonus_wagering_enable = 8;

  // Variant feature filters
  optional bool free_spin_enable = 9;
  optional bool free_chip_enable = 10;
  optional bool jackpot_enable = 11;
}

message FindAllGameResult {
  // Paginated game items
  repeated GameItemDto items = 1;
  PaginationMetaDto pagination = 2;

  // Related entities from results
  repeated ProviderDto providers = 3;
  repeated AggregatorInfoDto aggregators = 4;
  repeated CollectionDto collections = 5;
}

message GameItemDto {
  GameDto game = 1;
  GameVariantDto active_variant = 2;
  repeated string collection_identities = 3;
}

// ============================================
// Game Demo URL
// ============================================

message GameDemoUrlQuery {
  string identity = 1;
  string currency = 2;
  string locale = 3;
  PlatformDto platform = 4;
  string lobby_url = 5;
}

message GameDemoUrlResult {
  string launch_url = 1;
}

// ============================================
// Play Game (Open Session)
// ============================================

message PlayGameCommand {
  string identity = 1;
  string player_id = 2;
  string currency = 3;
  string locale = 4;
  PlatformDto platform = 5;
  string lobby_url = 6;
  optional int64 spin_max_amount = 7;
}

message PlayGameResult {
  string launch_url = 1;
}

// ============================================
// Update Game
// ============================================

message UpdateGameCommand {
  string identity = 1;
  optional bool bonus_bet_enable = 2;
  optional bool bonus_wagering_enable = 3;
  optional bool active = 4;
}

message UpdateGameResult {
  // Empty response - success indicated by no error
}

// ============================================
// Update Game Image
// ============================================

message UpdateGameImageCommand {
  string identity = 1;
  string key = 2;
  bytes file = 3;
  string extension = 4;
}

message UpdateGameImageResult {
  // Empty response - success indicated by no error
}

// ============================================
// Add Game Tag
// ============================================

message AddGameTagCommand {
  string identity = 1;
  string tag = 2;
}

message AddGameTagResult {
  // Empty response - success indicated by no error
}

// ============================================
// Remove Game Tag
// ============================================

message RemoveGameTagCommand {
  string identity = 1;
  string tag = 2;
}

message RemoveGameTagResult {
  // Empty response - success indicated by no error
}

// ============================================
// Add Game Favourite
// ============================================

message AddGameFavouriteCommand {
  string game_identity = 1;
  string player_id = 2;
}

message AddGameFavouriteResult {
  // Empty response - success indicated by no error
}

// ============================================
// Remove Game Favourite
// ============================================

message RemoveGameFavouriteCommand {
  string game_identity = 1;
  string player_id = 2;
}

message RemoveGameFavouriteResult {
  // Empty response - success indicated by no error
}

// ============================================
// Find All Game Wins (Paginated)
// ============================================

message FindAllGameWinsQuery {
  PaginationRequestDto pagination = 1;

  optional string game_identity = 2;
  optional string player_id = 3;
  optional string currency = 4;

  // Amount range
  optional int64 min_amount = 5;
  optional int64 max_amount = 6;

  // Date range
  optional TimestampDto start_at = 7;
  optional TimestampDto end_at = 8;
}

message FindAllGameWinsResult {
  repeated GameWonItemDto items = 1;
  PaginationMetaDto pagination = 2;
}

message GameWonItemDto {
  string id = 1;
  string game_identity = 2;
  string player_id = 3;
  int64 amount = 4;
  string currency = 5;
  TimestampDto created_at = 6;
}

// ============================================
// Get Freespin Preset
// ============================================

message GetFreespinPresetQuery {
  string game_identity = 1;
}

message GetFreespinPresetResult {
  // Preset configuration as key-value pairs
  // Keys are preset field names, values are the preset options/values
  map<string, string> preset = 1;
}

// ============================================
// Create Freespin
// ============================================

message CreateFreespinCommand {
  string game_identity = 1;
  string player_id = 2;
  string reference_id = 3;
  string currency = 4;
  TimestampDto start_at = 5;
  TimestampDto end_at = 6;
  // Preset values selected by the operator (key -> value)
  map<string, int32> preset_values = 7;
}

message CreateFreespinResult {
  // Empty response - success indicated by no error
}

// ============================================
// Cancel Freespin
// ============================================

message CancelFreespinCommand {
  string game_identity = 1;
  string reference_id = 2;
}

message CancelFreespinResult {
  // Empty response - success indicated by no error
}
